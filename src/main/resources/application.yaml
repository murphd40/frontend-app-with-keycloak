spring:
  application:
    name: frontendapp
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: frontend-app
            client-secret: g4p6H8zLxcii7dLjEdO4jIqH09IRgjWf
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/frontend-app
            user-name-attribute: preferred_username

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
